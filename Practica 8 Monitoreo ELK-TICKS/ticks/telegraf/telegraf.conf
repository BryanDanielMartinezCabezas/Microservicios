[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "telegraf"
  omit_hostname = false

[[inputs.http]]
  urls = ["http://microservicio:4000/metrics"]
  method = "GET"
  data_format = "influx"
  interval = "10s"

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "telegraf"

[[outputs.influxdb]]
  urls = ["http://kapacitor:9092"]
  database = "telegraf"
