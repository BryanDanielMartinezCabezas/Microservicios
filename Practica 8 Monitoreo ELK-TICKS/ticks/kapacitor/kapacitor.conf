hostname = "kapacitor"
data_dir = "/var/lib/kapacitor"

[http]
  bind-address = ":9092"
  auth-enabled = false
  log-enabled = true
  write-tracing = false
  pprof-enabled = false
  https-enabled = false

[[influxdb]]
  enabled = true
  name = "default"
  default = true
  urls = ["http://influxdb:8086"]
  timeout = 0
  username = ""
  password = ""
  insecure-skip-verify = false
  startup-timeout = "5m"

[logging]
  file = "STDERR"
  level = "INFO"
